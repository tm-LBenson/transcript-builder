name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    name: Go test and vet
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.24.x"

      - name: Test
        run: go test ./... -count=1

      - name: Vet
        run: go vet ./...

      - name: Build
        run: go build -trimpath -o meeting-transcriber.exe ./cmd/meeting-transcriber
